name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.actor == 'ezms'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # ─── Lint & Build ─────────────────────────────────────────────────────────

      - run: pnpm lint
      - run: pnpm build

      # ─── Bump version + generate CHANGELOG ────────────────────────────────────

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: pnpm changeset version

      - name: Commit version bump
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: release v${VERSION} :bookmark:"
            git push
          fi

      # ─── Publish ──────────────────────────────────────────────────────────────

      - name: Publish to npm
        run: pnpm changeset publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push tags
        run: git push --follow-tags

      # ─── GitHub Release ───────────────────────────────────────────────────────

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const start = changelog.indexOf('## ' + process.env.VERSION);
            if (start === -1) process.exit(1);
            const after = changelog.indexOf('\n## ', start + 1);
            const block = after === -1 ? changelog.slice(start) : changelog.slice(start, after);
            fs.writeFileSync('/tmp/release-notes.md', block.trim());
          " VERSION="$VERSION"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md
