name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ─── Run benchmark ───────────────────────────────────────────────────────
      # Run 5 times and take the median to reduce CI runner noise.

      - name: Run benchmark
        run: |
          for i in 1 2 3 4 5; do
            pnpm benchmark:pure 2>/dev/null >> /tmp/bench-runs.txt
          done

      - name: Parse result
        id: result
        run: |
          # Extract all 5 samples, sort numerically, pick the middle value (median)
          NS=$(grep -oP 'mirror_ns_per_row=\K[\d.]+' /tmp/bench-runs.txt \
            | sort -n \
            | awk 'NR==3{print}')
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "ns=$NS" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          printf '{"ns_per_row":%s,"sha":"%s","date":"%s"}\n' \
            "$NS" "${{ github.sha }}" "$DATE" > /tmp/benchmark-result.json

      # ─── Compare with previous run ───────────────────────────────────────────

      - name: Download previous benchmark result
        id: download
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: benchmark.yml
          name: benchmark-result
          path: /tmp/prev-benchmark

      - name: Compare with previous
        id: compare
        run: |
          CURR="${{ steps.result.outputs.ns }}"
          PREV_FILE="/tmp/prev-benchmark/benchmark-result.json"

          if [ -f "$PREV_FILE" ]; then
            PREV=$(jq -r '.ns_per_row' "$PREV_FILE")
            PCT=$(node -e "process.stdout.write((($CURR-$PREV)/$PREV*100).toFixed(1))")

            echo "has_prev=true"  >> $GITHUB_OUTPUT
            echo "prev=$PREV"     >> $GITHUB_OUTPUT
            echo "pct=$PCT"       >> $GITHUB_OUTPUT

            # Flag as regression if >25% slower than previous run on main
            if (( $(echo "$PCT > 25" | bc -l) )); then
              echo "regression=true" >> $GITHUB_OUTPUT
            else
              echo "regression=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_prev=false"  >> $GITHUB_OUTPUT
            echo "pct=0"           >> $GITHUB_OUTPUT
            echo "regression=false" >> $GITHUB_OUTPUT
          fi

      # ─── Upload result for next comparison ───────────────────────────────────

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: /tmp/benchmark-result.json
          overwrite: true
          retention-days: 365

      # ─── Commit badge data ───────────────────────────────────────────────────

      - name: Update benchmark badge data
        run: |
          mkdir -p benchmark
          cp /tmp/benchmark-result.json benchmark/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark/latest.json
          git diff --staged --quiet || git commit -m "chore: update benchmark data [skip ci]"
          git push

      # ─── Build notification content ──────────────────────────────────────────

      - name: Build notification content
        id: notify
        run: |
          CURR="${{ steps.result.outputs.ns }}"
          DATE="${{ steps.result.outputs.date }}"
          SHA="${{ github.sha }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.compare.outputs.has_prev }}" = "true" ]; then
            PREV="${{ steps.compare.outputs.prev }}"
            PCT="${{ steps.compare.outputs.pct }}"
            SIGN=$(echo "$PCT >= 0" | bc -l | grep -q 1 && echo "+" || echo "")
            STATUS=$([ "${{ steps.compare.outputs.regression }}" = "true" ] \
              && echo "REGRESSAO DETECTADA" || echo "OK")

            echo "subject=[Mirror ORM] Benchmark — ${CURR} ns/row (${SIGN}${PCT}%)" \
              >> $GITHUB_OUTPUT

            {
              echo "body<<ENDBODY"
              echo "Mirror ORM — Benchmark"
              echo ""
              echo "Commit : $SHA"
              echo "Data   : $DATE"
              echo "Link   : $RUN_URL"
              echo ""
              echo "Resultado atual  : $CURR ns/row"
              echo "Resultado anterior: $PREV ns/row"
              echo "Variacao         : ${SIGN}${PCT}%"
              echo "Status           : $STATUS"
              echo ""
              echo "Referencia historica: ~50 ns/row"
              echo "ENDBODY"
            } >> $GITHUB_OUTPUT
          else
            echo "subject=[Mirror ORM] Benchmark — ${CURR} ns/row (primeira execucao)" \
              >> $GITHUB_OUTPUT

            {
              echo "body<<ENDBODY"
              echo "Mirror ORM — Benchmark"
              echo ""
              echo "Commit : $SHA"
              echo "Data   : $DATE"
              echo "Link   : $RUN_URL"
              echo ""
              echo "Resultado      : $CURR ns/row"
              echo "Status         : OK (primeira execucao, sem historico anterior)"
              echo ""
              echo "Referencia historica: ~50 ns/row"
              echo "ENDBODY"
            } >> $GITHUB_OUTPUT
          fi

      # ─── Send email ──────────────────────────────────────────────────────────
      # Secrets required in repository settings (Settings → Secrets and variables → Actions):
      #   SMTP_SERVER   — e.g. smtp.gmail.com
      #   SMTP_PORT     — e.g. 465
      #   SMTP_USERNAME — sender email address
      #   SMTP_PASSWORD — app password (Gmail: Google Account → Security → App passwords)

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: emanuelm.dev@gmail.com
          from: Mirror ORM CI <${{ secrets.SMTP_USERNAME }}>
          subject: ${{ steps.notify.outputs.subject }}
          body: ${{ steps.notify.outputs.body }}

      # ─── Create issue on regression ──────────────────────────────────────────

      - name: Create issue on regression
        if: steps.compare.outputs.regression == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const curr = '${{ steps.result.outputs.ns }}';
            const prev = '${{ steps.compare.outputs.prev }}';
            const pct  = '${{ steps.compare.outputs.pct }}';
            const sha  = '${{ github.sha }}';
            const run  = '${{ github.run_id }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `\u{1F422} Performance regression: +${pct}% slower (${curr} ns/row)`,
              body: [
                '## Performance Regression Detected',
                '',
                '| | |',
                '|---|---|',
                `| **Commit** | \`${sha}\` |`,
                `| **Current** | ${curr} ns/row |`,
                `| **Previous** | ${prev} ns/row |`,
                `| **Change** | +${pct}% |`,
                `| **Workflow run** | [View](https://github.com/${{ github.repository }}/actions/runs/${run}) |`,
                '',
                'The `benchmark.yml` workflow detected a performance regression after',
                'merging to `main`. Please investigate which recent commit caused this',
                'and open a fix PR to `develop`.',
              ].join('\n'),
              labels: ['performance', 'bug'],
            });
